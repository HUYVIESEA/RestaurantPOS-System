name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-checks:
    name: PR Validation Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check PR title
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          build
          ci
          chore
        requireScope: false
        
    - name: Check PR size
      uses: actions/github-script@v7
      with:
        script: |
          const pr = context.payload.pull_request;
          const additions = pr.additions;
          const deletions = pr.deletions;
          const total = additions + deletions;
          
          if (total > 1000) {
            core.warning(`⚠️ This PR is quite large (${total} lines changed). Consider breaking it into smaller PRs.`);
          }
          
          core.info(`📊 PR Stats: +${additions} -${deletions} (${total} total)`);
          
    - name: Check for merge conflicts
      run: |
        git fetch origin ${{ github.base_ref }}
        if ! git merge-tree $(git merge-base HEAD origin/${{ github.base_ref }}) origin/${{ github.base_ref }} HEAD | grep -q "^@@"; then
          echo "✅ No merge conflicts detected"
        else
          echo "⚠️ Potential merge conflicts detected"
          exit 1
        fi
        
  pr-labeler:
    name: Auto Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Label PR
      uses: actions/labeler@v5
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        configuration-path: .github/labeler.yml
        
  pr-comment:
    name: PR Comment Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Comment build status
      uses: actions/github-script@v7
      with:
        script: |
          const message = `## 🚀 PR Summary
          
          Thank you for your contribution! This PR will be automatically tested.
          
          ### 📋 Checklist
          - [ ] Code follows project style guidelines
          - [ ] Tests have been added/updated
          - [ ] Documentation has been updated
          - [ ] No breaking changes introduced
          - [ ] All CI checks pass
          
          ### 🔍 What happens next?
          1. ✅ Automated tests will run
          2. 👀 Code review by maintainers
          3. 🎉 Merge when approved
          
          Please ensure all checks pass before requesting review.`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });
