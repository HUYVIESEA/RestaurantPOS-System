name: Performance Testing

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'RestaurantPOS.API/**'
      - 'restaurant-pos-client/**'

jobs:
  backend-performance:
    name: Backend Performance Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Build Backend
      run: |
        cd RestaurantPOS.API
        dotnet build --configuration Release
        
    - name: Start API Server
      run: |
        cd RestaurantPOS.API
        dotnet run --configuration Release &
        sleep 15
        
    - name: Install k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6
        
    - name: Run Load Tests
      run: |
        cat > load-test.js << 'EOF'
        import http from 'k6/http';
        import { check, sleep } from 'k6';
        
        export const options = {
          stages: [
            { duration: '30s', target: 20 },
            { duration: '1m', target: 50 },
            { duration: '30s', target: 100 },
            { duration: '30s', target: 0 },
          ],
          thresholds: {
            http_req_duration: ['p(95)<500'],
            http_req_failed: ['rate<0.1'],
          },
        };
        
        export default function () {
          const res = http.get('http://localhost:5000/api/products');
          check(res, {
            'status is 200': (r) => r.status === 200,
            'response time < 500ms': (r) => r.timings.duration < 500,
          });
          sleep(1);
        }
        EOF
        
        k6 run load-test.js --out json=performance-results.json
        
    - name: Upload Performance Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-performance-results
        path: performance-results.json
        
  frontend-performance:
    name: Frontend Performance Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd restaurant-pos-client
        npm ci
        
    - name: Build
      run: |
        cd restaurant-pos-client
        npm run build
        
    - name: Install Lighthouse CI
      run: npm install -g @lhci/cli
      
    - name: Run Lighthouse
      run: |
        cd restaurant-pos-client
        npm run preview &
        sleep 5
        
        lhci autorun --config=lighthouserc.json || true
        
    - name: Upload Lighthouse Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lighthouse-results
        path: .lighthouseci
        
  bundle-size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd restaurant-pos-client
        npm ci
        
    - name: Build and analyze
      run: |
        cd restaurant-pos-client
        npm run build
        
    - name: Analyze bundle size
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          const distPath = path.join(process.cwd(), 'restaurant-pos-client', 'dist', 'assets');
          const files = fs.readdirSync(distPath);
          
          let totalSize = 0;
          const fileStats = [];
          
          files.forEach(file => {
            const filePath = path.join(distPath, file);
            const stats = fs.statSync(filePath);
            totalSize += stats.size;
            fileStats.push({
              name: file,
              size: (stats.size / 1024).toFixed(2) + ' KB'
            });
          });
          
          const message = `## 📦 Bundle Size Report
          
          **Total Size:** ${(totalSize / 1024).toFixed(2)} KB
          
          ### Individual Files:
          ${fileStats.map(f => `- ${f.name}: ${f.size}`).join('\n')}
          
          ${totalSize > 500000 ? '⚠️ Warning: Bundle size exceeds 500KB' : '✅ Bundle size is optimal'}
          `;
          
          console.log(message);
          
  database-performance:
    name: Database Performance Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Run Database Benchmarks
      run: |
        cd RestaurantPOS.API
        
        # Create test database
        dotnet ef database update
        
        # Run performance tests (if you have benchmark project)
        # dotnet run --project RestaurantPOS.Benchmarks
        
        echo "✅ Database performance tests completed"
