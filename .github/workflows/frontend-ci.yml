name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'restaurant-pos-client/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'restaurant-pos-client/**'

jobs:
  build-and-test:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: restaurant-pos-client/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      working-directory: ./restaurant-pos-client
      
    - name: Lint check
      run: npm run lint
      working-directory: ./restaurant-pos-client
      continue-on-error: true
      
    - name: Type check
      run: npm run type-check
      working-directory: ./restaurant-pos-client
      continue-on-error: true
      
    - name: Run tests
      run: npm run test
      working-directory: ./restaurant-pos-client
      if: always()
      
    - name: Build
      run: npm run build
      working-directory: ./restaurant-pos-client
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5000' }}
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        name: frontend-build
        path: ./restaurant-pos-client/dist
        retention-days: 7
        
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: restaurant-pos-client/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      working-directory: ./restaurant-pos-client
      
    - name: Security audit
      run: npm audit --audit-level=moderate
      working-directory: ./restaurant-pos-client
      continue-on-error: true
      
    - name: Bundle size check
      run: npm run build -- --mode production
      working-directory: ./restaurant-pos-client
      continue-on-error: true
      
  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm ci
      working-directory: ./restaurant-pos-client
      
    - name: Build
      run: npm run build
      working-directory: ./restaurant-pos-client
      
    - name: Run Lighthouse
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './restaurant-pos-client/lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true
      continue-on-error: true
