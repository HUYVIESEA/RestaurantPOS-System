name: Dependency Review

on:
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: moderate
        deny-licenses: GPL-3.0, AGPL-3.0
        
  backend-dependencies:
    name: Backend Dependency Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Check for vulnerable packages
      run: |
        cd RestaurantPOS.API
        dotnet list package --vulnerable --include-transitive > ../dependency-report.txt
        cat ../dependency-report.txt
        
    - name: Upload dependency report
      uses: actions/upload-artifact@v4
      with:
        name: backend-dependency-report
        path: dependency-report.txt
        
  frontend-dependencies:
    name: Frontend Dependency Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm ci
      working-directory: ./restaurant-pos-client
      
    - name: Run npm audit
      run: |
        npm audit --json > ../frontend-audit.json || true
        npm audit
      working-directory: ./restaurant-pos-client
      continue-on-error: true
      
    - name: Upload audit report
      uses: actions/upload-artifact@v4
      with:
        name: frontend-audit-report
        path: frontend-audit.json
        
  android-dependencies:
    name: Android Dependency Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: ./RestaurantPOS.Android
      
    - name: Check dependencies
      run: ./gradlew dependencies > ../android-dependencies.txt
      working-directory: ./RestaurantPOS.Android
      
    - name: Upload dependency report
      uses: actions/upload-artifact@v4
      with:
        name: android-dependency-report
        path: android-dependencies.txt
