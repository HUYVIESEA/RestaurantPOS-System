name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20.x'

jobs:
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: RestaurantPOS_Test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore RestaurantPOS.API/RestaurantPOS.API.csproj

      - name: Build
        run: dotnet build RestaurantPOS.API/RestaurantPOS.API.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test RestaurantPOS.Tests/RestaurantPOS.Tests.csproj --configuration Release --verbosity normal --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: TestResults/

      - name: Publish
        run: dotnet publish RestaurantPOS.API/RestaurantPOS.API.csproj --configuration Release --no-build --output publish/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: publish/

  frontend:
    name: Frontend - Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: restaurant-pos-client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: restaurant-pos-client

      - name: Lint
        run: npm run lint --if-present
        working-directory: restaurant-pos-client

      - name: Build
        run: npm run build
        working-directory: restaurant-pos-client

  docker:
    name: Docker - Build Image
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: restaurant-pos-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./restaurant-pos-client
          push: false
          tags: restaurant-pos-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
