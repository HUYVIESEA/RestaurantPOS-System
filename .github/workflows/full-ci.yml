name: Full CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend:
    name: Backend Build
    uses: ./.github/workflows/backend-ci.yml
    
  frontend:
    name: Frontend Build
    uses: ./.github/workflows/frontend-ci.yml
    
  android:
    name: Android Build
    uses: ./.github/workflows/android-ci.yml
    
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    services:
      selenium:
        image: selenium/standalone-chrome:latest
        options: --shm-size=2gb
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Start Backend
      run: |
        cd RestaurantPOS.API
        dotnet run --configuration Release &
        sleep 10
      continue-on-error: true
      
    - name: Start Frontend
      run: |
        cd restaurant-pos-client
        npm ci
        npm run build
        npm run preview &
        sleep 5
      continue-on-error: true
      
    - name: Run E2E Tests
      run: |
        cd restaurant-pos-client
        npm run test:e2e
      continue-on-error: true
      
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend, frontend, android]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.yourdomain.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download backend artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-publish
        path: ./backend-publish
        
    - name: Download frontend artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: ./frontend-build
        
    - name: Deploy Backend to Staging
      run: |
        echo "Deploying backend to staging..."
        # Add your deployment script here
        # Example: rsync, scp, or cloud provider CLI
      continue-on-error: true
      
    - name: Deploy Frontend to Staging
      run: |
        echo "Deploying frontend to staging..."
        # Add your deployment script here
      continue-on-error: true
      
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://yourdomain.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          backend-publish/**
          frontend-build/**
          android-release-apk/**
          android-release-aab/**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Deploy to Production
      run: |
        echo "Production deployment requires manual approval"
        echo "Please review staging deployment before proceeding"
      continue-on-error: true
