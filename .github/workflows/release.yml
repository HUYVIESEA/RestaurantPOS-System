name: Release Automation

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
        
    - name: Generate changelog
      id: changelog
      run: |
        # Generate changelog from commits
        echo "# Changelog" > CHANGELOG_TEMP.md
        echo "" >> CHANGELOG_TEMP.md
        git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG_TEMP.md
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        body_path: CHANGELOG_TEMP.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  build-backend:
    name: Build Backend Release
    runs-on: windows-latest
    needs: create-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Publish Backend
      run: |
        dotnet publish RestaurantPOS.API/RestaurantPOS.API.csproj `
          --configuration Release `
          --output ./publish/backend `
          /p:PublishSingleFile=false `
          /p:PublishTrimmed=false
          
    - name: Create Backend Archive
      run: |
        Compress-Archive -Path ./publish/backend/* -DestinationPath RestaurantPOS-Backend-${{ needs.create-release.outputs.version }}.zip
        
    - name: Upload Backend to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        files: RestaurantPOS-Backend-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  build-frontend:
    name: Build Frontend Release
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: restaurant-pos-client/package-lock.json
        
    - name: Build Frontend
      run: |
        cd restaurant-pos-client
        npm ci
        npm run build
        
    - name: Create Frontend Archive
      run: |
        cd restaurant-pos-client
        tar -czf ../RestaurantPOS-Frontend-${{ github.ref_name }}.tar.gz dist/
        
    - name: Upload Frontend to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        files: RestaurantPOS-Frontend-*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: ./RestaurantPOS.Android
      
    - name: Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_FILE }}
      run: |
        echo $ENCODED_KEYSTORE | base64 -di > RestaurantPOS.Android/restaurant-pos.keystore
      if: env.ENCODED_KEYSTORE != ''
      
    - name: Create keystore.properties
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        echo "storePassword=$KEYSTORE_PASSWORD" > RestaurantPOS.Android/keystore.properties
        echo "keyPassword=$KEY_PASSWORD" >> RestaurantPOS.Android/keystore.properties
        echo "keyAlias=$KEY_ALIAS" >> RestaurantPOS.Android/keystore.properties
        echo "storeFile=restaurant-pos.keystore" >> RestaurantPOS.Android/keystore.properties
      if: env.KEYSTORE_PASSWORD != ''
      
    - name: Build Release APK & AAB
      run: |
        ./gradlew assembleRelease
        ./gradlew bundleRelease
      working-directory: ./RestaurantPOS.Android
      
    - name: Rename artifacts
      run: |
        mv RestaurantPOS.Android/app/build/outputs/apk/release/app-release.apk \
           RestaurantPOS-Android-${{ github.ref_name }}.apk
        mv RestaurantPOS.Android/app/build/outputs/bundle/release/app-release.aab \
           RestaurantPOS-Android-${{ github.ref_name }}.aab
           
    - name: Upload Android to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          RestaurantPOS-Android-*.apk
          RestaurantPOS-Android-*.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-android]
    
    steps:
    - name: Send notification
      run: |
        echo "🎉 Release ${{ github.ref_name }} has been published!"
        echo "📦 All artifacts have been uploaded to GitHub Releases"
        # Add Slack/Discord/Email notification here if needed
