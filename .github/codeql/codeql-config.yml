# CodeQL Configuration for RestaurantPOS-System

name: "RestaurantPOS CodeQL Config"

# Disable default queries and use custom query suites
disable-default-queries: false

# Query suite to use
queries:
  - uses: security-and-quality
  - uses: security-extended

# Paths to ignore during analysis
paths-ignore:
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/bin/**'
  - '**/obj/**'
  - '**/*.min.js'
  - '**/vendor/**'
  - '**/wwwroot/lib/**'
  - '**/Migrations/**'  # Auto-generated migration files
  - '**/*.Designer.cs'  # Auto-generated designer files
  - '**/AssemblyInfo.cs'

# Paths to include
paths:
  - 'RestaurantPOS.API/**'
  - 'restaurant-pos-client/src/**'
  - 'RestaurantPOS.Android/app/src/main/**'

# Language-specific configurations
# C# configuration
csharp:
  # Build command (optional)
  # If not specified, CodeQL will try to auto-detect
  # build-command: "dotnet build RestaurantPOS.API/RestaurantPOS.API.csproj --configuration Release"

# JavaScript/TypeScript configuration  
javascript:
  # Include TypeScript files
  typescript: true
  # Ignore minified files
  ignore-minified: true

# Java/Kotlin configuration
java:
  # Use Gradle for building
  # build-command: "./gradlew assembleDebug"
