# Docker Compose cho Restaurant POS System
version: '3.8'

services:
  # SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: restaurant-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Password123
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - restaurant-network

  # Backend API
  api:
    build:
      context: ./RestaurantPOS.API
      dockerfile: Dockerfile
    container_name: restaurant-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=RestaurantPOS;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=true
    ports:
      - "5000:80"
    depends_on:
      - sqlserver
    networks:
      - restaurant-network
    restart: unless-stopped

  # Frontend
  client:
    build:
      context: ./restaurant-pos-client
      dockerfile: Dockerfile
    container_name: restaurant-client
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - restaurant-network
    restart: unless-stopped

volumes:
  sqldata:

networks:
  restaurant-network:
    driver: bridge
