# Docker Compose cho Restaurant POS System
version: '3.8'

services:
  # SQL Server
  # PostgreSQL (Database thực tế của hệ thống cũ)
  postgres:
    image: postgres:15
    container_name: restaurant-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=huy@data
      - POSTGRES_DB=RestaurantPOS
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - restaurant-network

  # Backend API
  api:
    build:
      context: ./RestaurantPOS.API
      dockerfile: Dockerfile
    container_name: restaurant-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=RestaurantPOS;Username=postgres;Password=huy@data
    ports:
      - "5000:80"
    depends_on:
      - postgres
    networks:
      - restaurant-network
    restart: unless-stopped

  # Frontend
  client:
    build:
      context: ./restaurant-pos-client
      dockerfile: Dockerfile
    container_name: restaurant-client
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - restaurant-network
    restart: unless-stopped

  # --- BIG DATA SECTION ---
  # Database chính: MongoDB
  mongo-pos:
    image: mongo:latest
    container_name: mongo-pos
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db  # Mount dữ liệu ra ổ cứng thật
    deploy:
      resources:
        limits:
          memory: 2G     # Giới hạn RAM
    networks:
      - restaurant-network

  # Giao diện quản lý Database (Web UI)
  mongo-express:
    image: mongo-express
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo-pos
    depends_on:
      - mongo-pos
    networks:
      - restaurant-network

volumes:
  pgdata:
  mongodata:

networks:
  restaurant-network:
    driver: bridge
